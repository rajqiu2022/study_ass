{% extends "base.html" %}
{% block title %}修改密码{% endblock %}
{% block page_title %}修改密码{% endblock %}

{% block content %}
<div style="max-width:460px;">
    <div class="card">
        <div class="card-title"><i class="ri-lock-2-line"></i> 修改密码</div>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">原密码</label>
                <input type="password" name="old_password" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">新密码</label>
                <input type="password" name="new_password" class="form-input" placeholder="至少6个字符" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label">确认新密码</label>
                <input type="password" name="confirm_password" class="form-input" required>
            </div>
            <button type="submit" class="btn btn-primary"><i class="ri-check-line"></i> 确认修改</button>
        </form>
    </div>
</div>
{% endblock %}
