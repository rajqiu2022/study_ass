{% extends "base.html" %}
{% block title %}登录 - 智能知识库{% endblock %}

{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;">
    <div style="width:100%;max-width:400px;">
        <div style="text-align:center;margin-bottom:36px;">
            <div style="width:64px;height:64px;border-radius:16px;background:var(--accent-glow);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
                <i class="ri-brain-line" style="font-size:32px;color:var(--accent-hover);"></i>
            </div>
            <h1 style="font-size:26px;font-weight:700;letter-spacing:-0.5px;">智能知识库</h1>
            <p style="color:var(--text-secondary);font-size:14px;margin-top:6px;">AI 驱动 · 自动整理 · Obsidian 同步</p>
        </div>

        <div class="card" style="padding:28px;">
            <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;">欢迎回来</h2>
            <p style="color:var(--text-secondary);font-size:13px;margin-bottom:22px;">登录你的账号</p>

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-input" placeholder="输入用户名" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-input" placeholder="输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:6px;">
                    <i class="ri-login-box-line"></i> 登 录
                </button>
            </form>

            <div style="text-align:center;margin-top:18px;padding-top:18px;border-top:1px solid var(--border);">
                <span style="color:var(--text-secondary);font-size:13px;">没有账号？</span>
                <a href="{{ url_for('auth.register') }}" style="font-weight:600;font-size:13px;"> 立即注册</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
