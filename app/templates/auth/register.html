{% extends "base.html" %}
{% block title %}注册 - 智能知识库{% endblock %}

{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;">
    <div style="width:100%;max-width:400px;">
        <div style="text-align:center;margin-bottom:36px;">
            <div style="width:64px;height:64px;border-radius:16px;background:var(--accent-glow);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
                <i class="ri-brain-line" style="font-size:32px;color:var(--accent-hover);"></i>
            </div>
            <h1 style="font-size:26px;font-weight:700;">智能知识库</h1>
        </div>

        <div class="card" style="padding:28px;">
            <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;">创建账号</h2>
            <p style="color:var(--text-secondary);font-size:13px;margin-bottom:22px;">开始你的智能知识管理</p>

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-input" placeholder="2-20个字符" required autofocus minlength="2" maxlength="20">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-input" placeholder="至少6个字符" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" name="confirm_password" class="form-input" placeholder="再次输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:6px;">
                    <i class="ri-user-add-line"></i> 注 册
                </button>
            </form>

            <div style="text-align:center;margin-top:18px;padding-top:18px;border-top:1px solid var(--border);">
                <span style="color:var(--text-secondary);font-size:13px;">已有账号？</span>
                <a href="{{ url_for('auth.login') }}" style="font-weight:600;font-size:13px;"> 返回登录</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
