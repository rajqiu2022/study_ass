{% extends "base.html" %}
{% block title %}{{ '编辑' if note else '新建' }}笔记{% endblock %}
{% block page_title %}{{ '编辑笔记' if note else '新建笔记' }}{% endblock %}

{% block top_actions %}
<a href="{{ url_for('notes.note_list') }}" class="btn btn-ghost"><i class="ri-arrow-left-line"></i> 返回</a>
{% endblock %}

{% block content %}
<form method="POST" style="max-width:860px;">
    <div class="card" style="margin-bottom:20px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
            <div class="form-group" style="margin:0;">
                <label class="form-label">标题</label>
                <input type="text" name="title" class="form-input" value="{{ note.title if note else '' }}" placeholder="笔记标题" required>
            </div>
            <div class="form-group" style="margin:0;">
                <label class="form-label">标签</label>
                <input type="text" name="tags" class="form-input" value="{{ note.tags if note else '' }}" placeholder="逗号分隔">
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div class="form-group" style="margin:0;">
                <label class="form-label">文件夹</label>
                <input type="text" name="folder" class="form-input" value="{{ note.folder if note else '/' }}" placeholder="如 /技术/Python" list="fl">
                <datalist id="fl"><option value="/">{% for f in folders %}<option value="{{ f }}">{% endfor %}</datalist>
            </div>
            <div class="form-group" style="margin:0;">
                <label class="form-label">分类</label>
                <select name="category" class="form-select">
                    <option value="auto" {{ 'selected' if not note }}>🤖 AI 自动分类</option>
                    {% for v, l in categories %}<option value="{{ v }}" {{ 'selected' if note and note.category==v }}>{{ l }}</option>{% endfor %}
                </select>
            </div>
        </div>
    </div>
    <div class="card" style="margin-bottom:20px;">
        <div class="card-title"><i class="ri-markdown-line"></i> 内容 <span style="font-size:11px;color:var(--text-muted);font-weight:400;margin-left:6px;">Markdown 格式，自动同步 Obsidian</span></div>
        <textarea name="content" class="form-textarea" rows="18" placeholder="在这里写笔记...">{{ note.content if note else '' }}</textarea>
    </div>
    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary btn-lg"><i class="ri-save-line"></i> {{ '保存' if note else '创建' }}</button>
        <a href="{{ url_for('notes.note_list') }}" class="btn btn-ghost btn-lg">取消</a>
    </div>
</form>
{% endblock %}
